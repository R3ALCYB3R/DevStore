name: Update Store Data

on:
  push:
    paths:
      - 'ipas/**' # Only runs when you add a new app file

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Update Script
        run: |
          # This simple script adds the new IPAs to your list
          python3 .github/scripts/update_apps.py

      - name: Commit Changes
        run: |
          git config --global user.name "DevStore-Bot"
          git config --global user.email "bot@github.com"
          git add apps.json
          git commit -m "Auto-update apps.json"
          git push
